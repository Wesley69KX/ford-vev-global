<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Ford VEV - Central CC: 2748</title>

<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="logo.png">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

<style>
:root {
    --bg-base:#020617;
    --bg-card:rgba(30,41,59,0.6);
    --border-glow:#38bdf8;
    --text-main:#f8fafc;
    --text-muted:#94a3b8;
    --danger:#ef4444;
    --success:#10b981;
    --purple:#a855f7;
    --orange:#f97316;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Inter',system-ui;
    background:linear-gradient(180deg,#020617,#0f172a);
    color:var(--text-main);
}

/* HEADER */
header{
    background:rgba(2,6,23,0.8);
    backdrop-filter:blur(12px);
    border-bottom:1px solid rgba(56,189,248,0.2);
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:1rem 1.5rem;
    position:sticky;
    top:0;
    z-index:50;
}

.header-info{
    text-align:right;
}
.header-info small{
    color:var(--text-muted);
    font-size:0.7rem;
}
.header-info strong{
    color:var(--border-glow);
}

/* CONTAINER */
.container{
    max-width:720px;
    margin:auto;
    padding:1.5rem;
}

/* TITLES */
h2{
    font-size:0.75rem;
    text-transform:uppercase;
    letter-spacing:2px;
    color:var(--border-glow);
    margin:2rem 0 0.8rem;
}

/* CARDS */
.grid{
    display:grid;
    gap:12px;
}

.card{
    background:var(--bg-card);
    backdrop-filter:blur(12px);
    padding:1rem;
    border-radius:0.8rem;
    display:flex;
    align-items:center;
    gap:12px;
    border:1px solid rgba(56,189,248,0.15);
    border-left:4px solid var(--border-glow);
    cursor:pointer;
    transition:.25s;
}

.card:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

.card:active{
    transform:scale(0.96);
}

.icon{
    width:42px;
    height:42px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:10px;
    background:rgba(56,189,248,0.1);
}

/* BUTTON */
.btn{
    width:100%;
    padding:1rem;
    border-radius:0.6rem;
    border:1px solid var(--border-glow);
    background:transparent;
    color:var(--border-glow);
    font-weight:bold;
    cursor:pointer;
    transition:.2s;
}

.btn:hover{
    background:var(--border-glow);
    color:#000;
}

/* MODAL */
.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.85);
    display:none;
    align-items:flex-end;
}

.modal-content{
    width:100%;
    max-width:720px;
    margin:auto;
    background:linear-gradient(180deg,#020617,#0f172a);
    border-radius:20px 20px 0 0;
    padding:1.5rem;
    max-height:90vh;
    overflow:auto;
}

.close{
    position:absolute;
    right:20px;
    top:15px;
    cursor:pointer;
}

/* INPUT */
input,textarea{
    width:100%;
    padding:0.9rem;
    margin-bottom:10px;
    border-radius:8px;
    border:1px solid #1e293b;
    background:#020617;
    color:white;
}

input:focus{
    border-color:var(--border-glow);
    box-shadow:0 0 10px rgba(56,189,248,0.3);
}

/* SCROLL */
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-thumb{background:#334155;border-radius:10px;}

</style>
</head>

<body>

<header>
    <img src="logo.png" style="height:30px">
    <div class="header-info">
        <small>Unidade</small><br>
        <strong>EJA: 3108</strong><br>
        <small>CC: 2748</small>
    </div>
</header>

<div class="container">

<h2>Operações</h2>
<div class="grid">

<a href="https://forms.office.com/r/LGrPxcte1T" target="_blank" class="card">
<div class="icon"><span class="material-icons">fact_check</span></div>
<div>
<b>Check List</b><br>
<small>Diário</small>
</div>
</a>

<a href="https://forms.office.com/r/FmGd5gJF5e" target="_blank" class="card">
<div class="icon"><span class="material-icons">local_gas_station</span></div>
<div>
<b>Abastecimento</b><br>
<small>Litragem</small>
</div>
</a>

</div>

<h2>Engenharia</h2>
<div class="grid">

<div class="card" onclick="openModal('roteiro')" style="border-left-color:var(--purple)">
<div class="icon" style="color:var(--purple)">
<span class="material-icons">alt_route</span>
</div>
<div><b>Ciclos R389</b></div>
</div>

<div class="card" onclick="app.gerarRelatorioResumo()">
<div class="icon"><span class="material-icons">analytics</span></div>
<div><b>Resumo do Turno</b></div>
</div>

<div class="card" onclick="openModal('frenagem')" style="border-left-color:var(--orange)">
<div class="icon" style="color:var(--orange)">
<span class="material-icons">speed</span>
</div>
<div><b>Frenagem</b></div>
</div>

<div class="card" onclick="openModal('laudo')">
<div class="icon"><span class="material-icons">verified</span></div>
<div><b>Laudo IA</b></div>
</div>

</div>
</div>

<!-- MODALS -->

<div id="roteiro" class="modal">
<div class="modal-content">
<span class="close" onclick="closeModal('roteiro')">X</span>
<h3>Ciclos</h3>
<input placeholder="VIN">
<button class="btn">Registrar</button>
</div>
</div>

<div id="frenagem" class="modal">
<div class="modal-content">
<span class="close" onclick="closeModal('frenagem')">X</span>
<h3>Frenagem</h3>
<button class="btn">Registrar Volta</button>
</div>
</div>

<div id="laudo" class="modal">
<div class="modal-content">
<span class="close" onclick="closeModal('laudo')">X</span>
<h3>Laudo</h3>
<input placeholder="VIN">
<textarea placeholder="Observação"></textarea>
<button class="btn">Emitir</button>
</div>
</div>

<script src="app.js"></script>

<script>
function openModal(id){
    document.getElementById(id).style.display="flex";
}
function closeModal(id){
    document.getElementById(id).style.display="none";
}
</script>

</body>
</html>
