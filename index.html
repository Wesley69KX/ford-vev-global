<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inspeção Rápida</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffffff">
    <link rel="icon" type="image/png" href="icone.png">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root { --primary: #003478; --bg: #ffffff; --surface: #f8f9fa; --text: #333333; --border: #e0e0e0; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); padding-bottom: 80px; }

        /* Cabeçalho Branco Clean */
        header { background-color: var(--bg); border-bottom: 1px solid var(--border); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .header-logo { max-height: 40px; max-width: 150px; object-fit: contain; }
        .header-title { font-weight: bold; color: var(--primary); font-size: 1.1rem; }

        .container { padding: 20px; max-width: 600px; margin: 0 auto; }
        
        /* Formulário */
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 0.9rem; color: #555; }
        input[type="text"], input[type="date"], textarea { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; background: var(--surface); font-size: 1rem; outline: none; transition: 0.2s; }
        input:focus, textarea:focus { border-color: var(--primary); background: #fff; }

        /* Botão de Câmera */
        .camera-btn { background: var(--surface); border: 2px dashed #aaa; color: #555; padding: 20px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 8px; transition: 0.2s; }
        .camera-btn:active { background: #e9ecef; border-color: var(--primary); color: var(--primary); }
        
        /* Galeria de Fotos */
        .gallery { display: flex; gap: 10px; overflow-x: auto; margin-top: 15px; padding-bottom: 5px; }
        .photo-card { position: relative; width: 80px; height: 80px; flex-shrink: 0; }
        .photo-card img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; border: 1px solid var(--border); }
        .delete-btn { position: absolute; top: -5px; right: -5px; background: #dc3545; color: white; border: none; border-radius: 50%; width: 22px; height: 22px; font-size: 12px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* Botão Flutuante Gerar PDF */
        .fab-pdf { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--primary); color: white; border: none; padding: 15px 30px; border-radius: 30px; font-size: 1.1rem; font-weight: bold; box-shadow: 0 4px 10px rgba(0, 52, 120, 0.3); display: flex; align-items: center; gap: 10px; cursor: pointer; width: 90%; max-width: 400px; justify-content: center; z-index: 1000; }
        .fab-pdf:active { transform: translateX(-50%) scale(0.95); }
    </style>
</head>
<body>

    <header>
        <img id="app-logo" class="header-logo" src="logo.png" alt="Logo">
        <div class="header-title">Insp. CC: 2748</div>
    </header>

    <div class="container">
        
        <div class="form-group">
            <label>Placa / Identificação</label>
            <input type="text" id="f-id" placeholder="Ex: ABC-1234 ou Equipamento X" required>
        </div>

        <div class="form-group">
            <label>Data da Inspeção</label>
            <input type="date" id="f-data" required>
        </div>

        <div class="form-group">
            <label>Relato / Observações</label>
            <textarea id="f-obs" rows="4" placeholder="Descreva a situação, anomalias encontradas..."></textarea>
        </div>

        <div class="form-group">
            <label>Evidências Fotográficas</label>
            <input type="file" id="camera-input" accept="image/*" capture="environment" multiple style="display: none;" onchange="app.processarFotos(event)">
            
            <button class="camera-btn" onclick="document.getElementById('camera-input').click()">
                <span class="material-icons" style="font-size: 36px; color: var(--primary);">photo_camera</span>
                Tirar Foto Agora
            </button>
            
            <div id="galeria" class="gallery"></div>
        </div>

    </div>

    <button class="fab-pdf" onclick="app.gerarPDF()">
        <span class="material-icons">picture_as_pdf</span>
        Gerar Relatório em PDF
    </button>

    <script src="app.js"></script>
</body>
</html>
