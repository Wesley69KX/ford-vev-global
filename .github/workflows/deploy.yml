name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # O passo de compilação (npm run build) foi removido daqui!
      
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          
          # ATENÇÃO: Confirme se o nome do seu secret e do projectId estão iguais ao seu arquivo original!
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_FORD_VEV }}'
          channelId: live
          projectId: ford-vev
